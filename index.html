<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paisaje en Canvas 2D</title>
  <link rel="shortcut icon" href="./assets/img/favicon.png" type="image/x-icon">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">Paisaje Canvas 2D</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link active" href="#">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Acerca de</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Contenido principal -->
  <main class="container my-5 flex-grow-1">
    <div class="row align-items-center">
      <!-- Lienzo Canvas -->
      <div class="col-md-6 text-center mb-4 mb-md-0">
        <canvas id="bosqueCanvas" width="800" height="600" class="border border-dark rounded shadow"></canvas>
      </div>

      <!-- Imagen original -->
      <div class="col-md-6 text-center">
        <img src="./assets/img/imagen.png" alt="Imagen original del paisaje" class="img-fluid rounded shadow">
        <p class="text-muted mt-2">Imagen de referencia original</p>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-success text-white text-center py-3 mt-auto">
    <p class="mb-0">Desarrollado por <strong>Aylin Guadalupe Lucas Alvarado</strong> | © 2026</p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Script principal -->
  <script src="./assets/js/main.js"></script>
</body>
</html>
